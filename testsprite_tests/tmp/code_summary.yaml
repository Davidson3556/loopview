version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16 (App Router)
  - React 19
  - Tailwind CSS v3.4
  - "@insforge/sdk (auth, PostgreSQL, realtime, storage)"
  - InsForge Model Gateway (OpenRouter / Claude Sonnet) via OpenAI SDK
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Landing page with hero, three loop-phase cards, and a demo timeline
  - path: /auth
    file: src/app/auth/page.tsx
    auth_required: false
    description: Sign in / sign up (email + password) with optional email verification
  - path: /dashboard
    file: src/app/dashboard/page.tsx
    auth_required: false
    description: Loop dashboard; demo data when signed out, live realtime session when signed in
  - path: /history
    file: src/app/history/page.tsx
    auth_required: true
    description: List of past loop sessions and a Generate LOOP.md export
  - path: /session/[id]
    file: src/app/session/[id]/page.tsx
    auth_required: true
    description: Replay a past session with playback controls and a scrubber
  - path: /settings
    file: src/app/settings/page.tsx
    auth_required: true
    description: Save TestSprite API key, Project ID, and app URL under test
features:
  - name: User Authentication
    description: Register and sign in with email and password; redirect to dashboard on success
    files:
      - src/app/auth/page.tsx
      - src/lib/AuthProvider.tsx
      - src/lib/insforge.ts
    entry_route: /auth
    user_interactions:
      - Toggle between Sign in and Sign up
      - Fill name (sign up), email, and password fields
      - Click submit to sign in or create account
      - See an inline error message on invalid credentials
      - Enter a 6-digit code if email verification is enabled
    api_calls:
      - method: POST
        endpoint: /api/auth/sign-up (InsForge)
      - method: POST
        endpoint: /api/auth/sign-in (InsForge)
    auth_required: false
  - name: Loop Dashboard
    description: Three-panel Write/Verify/Result view plus a clickable loop timeline and stat tiles
    files:
      - src/app/dashboard/page.tsx
      - src/components/LoopView.tsx
      - src/lib/useLoopStream.ts
    entry_route: /dashboard
    user_interactions:
      - View Write, Verify, and Result panels for the current iteration
      - Click a timeline block to inspect that iteration
      - See stat tiles for total loops, passed, pass rate, and elapsed time
    api_calls:
      - method: GET
        endpoint: /api/database/records/loop_iterations (InsForge)
    auth_required: false
  - name: Loop Session Management
    description: Start a loop session, add iterations, and end the session
    files:
      - src/app/dashboard/page.tsx
      - src/lib/loops.ts
      - src/lib/simulateIteration.ts
    entry_route: /dashboard
    user_interactions:
      - Fill App URL under test and optional Project ID
      - Click Start session
      - Click Simulate iteration to add a new loop iteration
      - Click End to complete the session
      - Click New session to start over
    api_calls:
      - method: POST
        endpoint: /api/database/records/loop_sessions (InsForge)
      - method: POST
        endpoint: /api/database/records/loop_iterations (InsForge)
    auth_required: true
  - name: AI Fix Assistant
    description: Analyze a failed iteration and return a root cause and fix suggestion
    files:
      - src/app/api/ai-fix/route.ts
      - src/lib/aiFix.ts
      - src/components/LoopView.tsx
    entry_route: /dashboard
    user_interactions:
      - Select a failed iteration
      - Click Analyze failure
      - View the AI root cause, file/line, and fix snippet
      - Click Copy fix
    api_calls:
      - method: POST
        endpoint: /api/ai-fix
    auth_required: true
  - name: Loop History and LOOP.md Export
    description: List past sessions and generate a downloadable LOOP.md report
    files:
      - src/app/history/page.tsx
      - src/lib/loopMd.ts
    entry_route: /history
    user_interactions:
      - View past sessions with app URL, pass rate, and status
      - Click a session to open its replay
      - Click Generate LOOP.md
      - Copy or Download the generated report
    api_calls:
      - method: GET
        endpoint: /api/database/records/loop_sessions (InsForge)
    auth_required: true
  - name: Session Replay
    description: Replay a past session iteration-by-iteration with a scrubber
    files:
      - src/app/session/[id]/page.tsx
    entry_route: /session/[id]
    user_interactions:
      - Click Replay to step through iterations
      - Drag the scrubber to jump to any iteration
    api_calls:
      - method: GET
        endpoint: /api/database/records/loop_iterations (InsForge)
    auth_required: true
  - name: Connection Settings
    description: Persist per-user TestSprite key, Project ID, and app URL
    files:
      - src/app/settings/page.tsx
    entry_route: /settings
    user_interactions:
      - Fill TestSprite API key, Project ID, and App URL
      - Click Save settings
      - See a success confirmation; values persist across reload
    api_calls:
      - method: PATCH
        endpoint: /api/database/records/user_settings (InsForge)
    auth_required: true
known_limitations:
  - issue: Simulate iteration inserts scripted demo iterations, not real TestSprite runs
    location: src/lib/simulateIteration.ts
    impact: Used to demonstrate the realtime pipeline before the real runner is wired
  - issue: Failure bundle screenshot is a placeholder slot
    location: src/components/LoopView.tsx
    impact: Screenshot area shows a placeholder until real artifacts are stored
